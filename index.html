<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bisen General Store — Fresh groceries delivered to your door</title>
<meta name="description" content="Order groceries, dairy, snacks and beverages online from Bisen General Store, Gondia. We confirm every order on WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===================== TOKENS ===================== */
  :root{
    --ink:#1B2A4A;
    --ink-soft:#3B4A6B;
    --paper:#FAF6ED;
    --paper-2:#F1E9D6;
    --card:#FFFFFF;
    --marigold:#F2A60D;
    --marigold-dark:#C97F06;
    --maroon:#9A2B25;
    --maroon-dark:#7A211C;
    --leaf:#2F7D4F;
    --leaf-dark:#236339;
    --line:#E2D9C3;
    --error:#B3261E;
    --shadow-sm:0 2px 8px rgba(27,42,74,0.10);
    --shadow-md:0 8px 24px rgba(27,42,74,0.18);
    --radius:14px;
    --font-display:'Baloo 2', system-ui, sans-serif;
    --font-body:'Inter', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    line-height:1.45;
    padding-bottom:96px;
  }
  img{max-width:100%;display:block;}
  button{font-family:inherit;}
  a{color:inherit;}
  h1,h2,h3{font-family:var(--font-display);margin:0;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  :focus-visible{outline:3px solid var(--marigold-dark); outline-offset:2px;}

  .visually-hidden{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  /* ===================== HEADER / SIGNBOARD ===================== */
  .shop-header{
    position:relative;
    background:linear-gradient(180deg, var(--ink) 0%, #213461 100%);
    color:var(--paper);
    padding:28px 20px 22px;
    border-bottom:6px solid var(--marigold);
    overflow:hidden;
  }
  .shop-header::before, .shop-header::after{
    content:"";
    position:absolute;
    width:10px; height:10px;
    border-radius:50%;
    background:var(--marigold);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
    top:14px;
  }
  .shop-header::before{ left:14px; }
  .shop-header::after{ right:14px; }
  .shop-header__inner{ max-width:760px; margin:0 auto; text-align:center; }
  .shop-name{
    font-size:clamp(1.6rem, 6vw, 2.2rem);
    font-weight:800;
    letter-spacing:0.3px;
    color:var(--paper);
  }
  .shop-tagline{
    margin-top:4px;
    font-size:0.95rem;
    color:#D9C9A0;
    font-style:italic;
  }
  .shop-meta{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    font-size:0.78rem;
    color:#C9D2E6;
  }
  .shop-meta span{ display:inline-flex; align-items:center; gap:5px; }
  .shop-meta svg{ width:13px; height:13px; flex-shrink:0; }

  /* ===================== CATEGORY FILTER ===================== */
  .category-bar{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:10px 14px;
    display:flex;
    gap:8px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .category-bar::-webkit-scrollbar{ display:none; }
  .cat-pill{
    flex:0 0 auto;
    padding:8px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink-soft);
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .cat-pill:hover{ border-color:var(--marigold-dark); }
  .cat-pill.active{
    background:var(--maroon);
    border-color:var(--maroon);
    color:#fff;
  }

  /* ===================== PRODUCT GRID ===================== */
  main{ max-width:980px; margin:0 auto; padding:16px 14px 8px; }
  .empty-state{
    text-align:center;
    padding:40px 16px;
    color:var(--ink-soft);
  }
  .product-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
  }
  @media (min-width:560px){
    .product-grid{ grid-template-columns:repeat(3, 1fr); }
  }
  @media (min-width:820px){
    .product-grid{ grid-template-columns:repeat(4, 1fr); }
  }

  .product-card{
    background:var(--card);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow-sm);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .product-img-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:var(--paper-2);
    overflow:hidden;
  }
  .product-img-wrap img{
    width:100%; height:100%; object-fit:cover;
  }
  .price-tag{
    position:absolute;
    top:8px;
    left:8px;
    background:var(--marigold);
    color:var(--ink);
    font-family:var(--font-mono);
    font-weight:700;
    font-size:0.78rem;
    padding:4px 9px 4px 11px;
    border-radius:3px;
    box-shadow:var(--shadow-sm);
    clip-path:polygon(10% 0, 100% 0, 100% 100%, 10% 100%, 0 50%);
  }
  .product-body{
    padding:10px 12px 12px;
    display:flex;
    flex-direction:column;
    gap:4px;
    flex:1;
  }
  .product-name{
    font-family:var(--font-display);
    font-weight:700;
    font-size:0.92rem;
    line-height:1.25;
    color:var(--ink);
  }
  .product-desc{
    font-size:0.76rem;
    color:var(--ink-soft);
    flex:1;
  }
  .product-category-tag{
    font-size:0.65rem;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--leaf-dark);
    font-weight:600;
  }
  .add-btn{
    margin-top:8px;
    width:100%;
    padding:9px 0;
    border:none;
    border-radius:9px;
    background:var(--maroon);
    color:#fff;
    font-weight:700;
    font-size:0.84rem;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.15s ease;
  }
  .add-btn:hover{ background:var(--maroon-dark); }
  .add-btn:active{ transform:scale(0.96); }
  .add-btn.in-cart{ background:var(--leaf); }
  .add-btn.bump{ animation:bump 0.3s ease; }
  @keyframes bump{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
  }

  /* ===================== FLOATING BUTTONS ===================== */
  .fab-cart{
    position:fixed;
    right:16px;
    bottom:16px;
    z-index:30;
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--maroon);
    border:none;
    box-shadow:var(--shadow-md);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .fab-cart svg{ width:26px; height:26px; fill:#fff; }
  .fab-cart.bump{ animation:bump 0.3s ease; }
  .cart-badge{
    position:absolute;
    top:-4px;
    right:-4px;
    min-width:21px;
    height:21px;
    padding:0 4px;
    border-radius:999px;
    background:var(--marigold);
    color:var(--ink);
    font-size:0.72rem;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid var(--paper);
  }

  .fab-whatsapp{
    position:fixed;
    left:16px;
    bottom:16px;
    z-index:30;
    display:flex;
    align-items:center;
    gap:7px;
    background:var(--leaf);
    color:#fff;
    border:none;
    border-radius:999px;
    padding:13px 16px;
    box-shadow:var(--shadow-md);
    cursor:pointer;
    font-weight:700;
    font-size:0.82rem;
    text-decoration:none;
  }
  .fab-whatsapp:hover{ background:var(--leaf-dark); }
  .fab-whatsapp svg{ width:18px; height:18px; fill:#fff; flex-shrink:0; }
  .fab-whatsapp .wa-label{ white-space:nowrap; }
  @media (max-width:380px){
    .fab-whatsapp .wa-label{ display:none; }
    .fab-whatsapp{ padding:13px; }
  }

  /* ===================== CART SHEET ===================== */
  .overlay{
    position:fixed; inset:0;
    background:rgba(27,42,74,0.45);
    z-index:40;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .sheet{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:50;
    max-width:560px;
    margin:0 auto;
    background:var(--paper);
    border-radius:18px 18px 0 0;
    max-height:88vh;
    display:flex;
    flex-direction:column;
    transform:translateY(105%);
    transition:transform 0.28s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -8px 30px rgba(0,0,0,0.25);
  }
  .sheet.open{ transform:translateY(0); }

  .sheet-tear{
    height:12px;
    width:100%;
    background-image:linear-gradient(135deg, var(--paper) 25%, transparent 25%),
                      linear-gradient(225deg, var(--paper) 25%, transparent 25%);
    background-size:16px 16px;
    background-position:0 0;
    background-color:var(--card);
    flex-shrink:0;
    border-radius:18px 18px 0 0;
  }

  .sheet-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:6px 18px 10px;
    border-bottom:1px dashed var(--line);
    flex-shrink:0;
  }
  .sheet-header h2{ font-size:1.15rem; color:var(--ink); }
  .sheet-close{
    background:none;
    border:none;
    font-size:1.3rem;
    line-height:1;
    color:var(--ink-soft);
    cursor:pointer;
    padding:6px;
  }

  .sheet-body{
    overflow-y:auto;
    padding:12px 18px 18px;
    flex:1;
  }

  /* -- cart items -- */
  .cart-line{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 0;
    border-bottom:1px dashed var(--line);
  }
  .cart-line__info{ flex:1; min-width:0; }
  .cart-line__name{ font-weight:600; font-size:0.88rem; color:var(--ink); }
  .cart-line__price{ font-family:var(--font-mono); font-size:0.78rem; color:var(--ink-soft); margin-top:2px; }
  .qty-stepper{ display:flex; align-items:center; gap:8px; }
  .qty-stepper button{
    width:28px; height:28px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--card);
    font-size:1rem;
    font-weight:700;
    color:var(--maroon);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .qty-stepper span{ font-family:var(--font-mono); font-weight:700; min-width:18px; text-align:center; }
  .cart-line__remove{
    background:none; border:none;
    color:var(--error);
    font-size:0.72rem;
    text-decoration:underline;
    cursor:pointer;
    padding:4px;
    margin-left:4px;
  }

  .cart-totals{
    margin-top:10px;
    padding-top:10px;
    font-family:var(--font-mono);
  }
  .cart-totals .row{
    display:flex;
    justify-content:space-between;
    font-size:0.85rem;
    color:var(--ink-soft);
    padding:3px 0;
  }
  .cart-totals .row.grand{
    font-size:1.05rem;
    font-weight:800;
    color:var(--ink);
    border-top:1px solid var(--line);
    margin-top:6px;
    padding-top:8px;
  }

  .sheet-actions{ margin-top:16px; display:flex; flex-direction:column; gap:10px; }
  .btn{
    border:none;
    border-radius:10px;
    padding:13px 16px;
    font-weight:700;
    font-size:0.92rem;
    cursor:pointer;
    text-align:center;
  }
  .btn-primary{ background:var(--maroon); color:#fff; }
  .btn-primary:hover{ background:var(--maroon-dark); }
  .btn-primary:disabled{ background:#C9BFAE; cursor:not-allowed; }
  .btn-secondary{ background:transparent; color:var(--ink-soft); border:1px solid var(--line); }
  .btn-whatsapp{ background:var(--leaf); color:#fff; }
  .btn-whatsapp:hover{ background:var(--leaf-dark); }
  .btn-text{ background:none; color:var(--ink-soft); text-decoration:underline; font-weight:600; padding:6px; }

  /* -- checkout form -- */
  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:0.78rem;
    font-weight:700;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.4px;
    margin-bottom:5px;
  }
  .field input, .field textarea{
    width:100%;
    border:none;
    border-bottom:2px solid var(--line);
    background:transparent;
    font-family:var(--font-body);
    font-size:0.95rem;
    color:var(--ink);
    padding:7px 2px;
    resize:vertical;
  }
  .field input:focus, .field textarea:focus{
    border-bottom-color:var(--maroon);
    outline:none;
  }
  .field .req{ color:var(--maroon); }
  .field-error{
    font-size:0.74rem;
    color:var(--error);
    margin-top:4px;
    display:none;
  }
  .field.invalid input, .field.invalid textarea{ border-bottom-color:var(--error); }
  .field.invalid .field-error{ display:block; }

  .order-summary-box{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-family:var(--font-mono);
    font-size:0.76rem;
    color:var(--ink-soft);
    margin-bottom:16px;
    max-height:120px;
    overflow-y:auto;
  }
  .form-status{
    font-size:0.82rem;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    display:none;
  }
  .form-status.show{ display:block; }
  .form-status.error{ background:#FBE9E7; color:var(--error); }
  .form-status.loading{ background:var(--paper-2); color:var(--ink-soft); }

  /* -- confirmation -- */
  .confirm-wrap{ text-align:center; padding:18px 6px 6px; }
  .confirm-icon{
    width:58px; height:58px;
    border-radius:50%;
    background:var(--leaf);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 14px;
  }
  .confirm-icon svg{ width:28px; height:28px; fill:#fff; }
  .confirm-title{ font-size:1.2rem; color:var(--ink); margin-bottom:6px; }
  .confirm-text{ font-size:0.88rem; color:var(--ink-soft); margin-bottom:18px; }

  /* ===================== FOOTER ===================== */
  footer{
    max-width:980px;
    margin:24px auto 0;
    padding:18px 16px 30px;
    text-align:center;
    color:var(--ink-soft);
    font-size:0.78rem;
    border-top:1px solid var(--line);
  }
  footer strong{ color:var(--ink); font-family:var(--font-display); }
</style>
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="shop-header">
    <div class="shop-header__inner">
      <h1 class="shop-name" id="shopNameEl">Bisen General Store</h1>
      <p class="shop-tagline" id="shopTaglineEl">Fresh groceries delivered to your door</p>
      <div class="shop-meta">
        <span>
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
          <span id="shopLocationEl">Gondia, Maharashtra</span>
        </span>
        <span>
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1.1L6.6 10.8z"/></svg>
          <span id="shopPhoneEl">9545498527</span>
        </span>
      </div>
    </div>
  </header>

  <!-- ===================== CATEGORY FILTER ===================== -->
  <nav class="category-bar" id="categoryBar" aria-label="Filter products by category"></nav>

  <!-- ===================== PRODUCT GRID ===================== -->
  <main>
    <div class="product-grid" id="productGrid"></div>
    <p class="empty-state" id="emptyState" hidden>No products in this category yet.</p>
  </main>

  <footer>
    <p><strong id="shopNameFooter">Bisen General Store</strong></p>
    <p id="shopLocationFooter">Gondia, Maharashtra</p>
    <p>Orders are confirmed by phone or WhatsApp before delivery. Prices may vary slightly based on availability.</p>
  </footer>

  <!-- ===================== FLOATING BUTTONS ===================== -->
  <button class="fab-cart" id="cartFab" aria-label="Open cart">
    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.6-1.4 2.5c-.2.3-.2.7-.2 1.1 0 1.1.9 2 2 2h12v-2H7.4c-.1 0-.2-.1-.2-.2l.1-.3L8.5 13h7.5c.7 0 1.4-.4 1.7-1l3.6-6.6c.1-.2.2-.4.2-.6 0-.6-.4-1-1-1H5.2l-.9-2H1zM17 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
    <span class="cart-badge" id="cartBadge" hidden>0</span>
  </button>

  <a class="fab-whatsapp" id="waFab" href="#" target="_blank" rel="noopener" aria-label="Chat with us on WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.4c1.4.8 3.1 1.2 4.8 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18c-1.5 0-3-.4-4.3-1.2l-.3-.2-3.1.8.8-3-.2-.3C4.2 14.9 3.8 13.5 3.8 12c0-4.5 3.7-8.2 8.2-8.2s8.2 3.7 8.2 8.2-3.7 8-8.2 8zm4.5-6.1c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.2-.7.8-.8.9-.1.2-.3.2-.6.1-.2-.1-1-.4-1.9-1.2-.7-.6-1.2-1.4-1.3-1.6-.1-.2 0-.4.1-.5.1-.1.3-.3.4-.5.1-.1.2-.3.2-.4.1-.2 0-.3 0-.5-.1-.1-.6-1.5-.8-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.2.2-.9.9-.9 2.2 0 1.3.9 2.5 1.1 2.7.1.2 1.9 2.9 4.6 4 .6.3 1.1.4 1.5.6.6.2 1.2.2 1.6.1.5-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.2-1.2-.1-.2-.3-.2-.5-.3z" fill="currentColor"/></svg>
    <span class="wa-label">Chat</span>
  </a>

  <!-- ===================== CART SHEET ===================== -->
  <div class="overlay" id="overlay"></div>
  <section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-tear"></div>
    <div class="sheet-header">
      <h2 id="sheetTitle">Your order</h2>
      <button class="sheet-close" id="sheetClose" aria-label="Close cart">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"><!-- views injected by JS --></div>
  </section>

<script>
(function(){
  "use strict";

  /* =================================================================
     ✏️ SHOP CONFIG — edit everything in this block to customise the
     store. No other part of the file needs to change for a basic
     re-skin.
  ================================================================= */
  const CONFIG = {
    shopName: "Bisen General Store",
    tagline: "Fresh groceries delivered to your door",
    location: "Gondia, Maharashtra",
    phoneDisplay: "95454 98527",
    whatsappNumber: "919545498527", // country code + number, digits only, no +
    email: "tikeshbisen24@gmail.com",
    // Create a free form at https://formspree.io, then paste the form ID
    // (the part after /f/) below. Until you do, the WhatsApp fallback
    // button on the checkout step still works with zero setup.
    formspreeEndpoint: "https://formspree.io/f/YOUR_FORM_ID",
    categories: ["All", "Groceries", "Dairy", "Snacks", "Beverages"]
  };

  /* =================================================================
     ✏️ PRODUCTS — add, remove or edit items here.
     img: paste a direct imgbb.com image URL (right click the image on
     imgbb → "Copy image address"). Two real product photos are wired
     up below; the rest use a generated placeholder swatch so the page
     never shows a broken image — swap the "img" value for your own
     imgbb link any time.
  ================================================================= */
  const PRODUCTS = [
    { id: "p01", name: "Aashirvaad Atta (5kg)", price: 280, category: "Groceries",
      img: "https://i.ibb.co/spBQnXXN/204629-23-aashirvaad-select-atta.jpg",
      desc: "Premium whole wheat flour, stone-ground for soft rotis." },
    { id: "p02", name: "Amul Butter (500g)", price: 280, category: "Dairy",
      img: "https://i.ibb.co/HDWH7rD1/104864-8-amul-butter-pasteurised.png",
      desc: "Fresh pasteurised salted butter." },
    { id: "p03", name: "Tata Salt (1kg)", price: 28, category: "Groceries",
      img: null, desc: "Iodised salt for everyday cooking." },
    { id: "p04", name: "Fortune Sunflower Oil (1L)", price: 145, category: "Groceries",
      img: null, desc: "Light, healthy refined sunflower oil." },
    { id: "p05", name: "Parle-G Biscuits (Pack of 4)", price: 40, category: "Snacks",
      img: null, desc: "Classic glucose biscuits, a tea-time favourite." },
    { id: "p06", name: "Maggi Noodles (Pack of 4)", price: 56, category: "Snacks",
      img: null, desc: "Quick masala noodles, ready in minutes." },
    { id: "p07", name: "Red Label Tea (500g)", price: 230, category: "Beverages",
      img: null, desc: "Strong, rich blend for the perfect chai." },
    { id: "p08", name: "Amul Milk (1L Tetra Pack)", price: 66, category: "Dairy",
      img: null, desc: "Fresh toned milk, delivered cold." },
    { id: "p09", name: "Lays Classic Salted (Large)", price: 50, category: "Snacks",
      img: null, desc: "Crispy potato chips, lightly salted." },
    { id: "p10", name: "Mixed Fruit Juice (1L)", price: 120, category: "Beverages",
      img: null, desc: "No added sugar, 100% real fruit juice." }
  ];

  /* =================================================================
     STATE
  ================================================================= */
  const CART_KEY = "bisenGeneralStore_cart_v1";
  let cart = loadCart();           // { productId: qty }
  let activeCategory = "All";
  let sheetView = "cart";          // 'cart' | 'checkout' | 'confirm'

  /* =================================================================
     DOM REFS
  ================================================================= */
  const productGrid   = document.getElementById("productGrid");
  const emptyState    = document.getElementById("emptyState");
  const categoryBar   = document.getElementById("categoryBar");
  const cartFab       = document.getElementById("cartFab");
  const cartBadge     = document.getElementById("cartBadge");
  const waFab         = document.getElementById("waFab");
  const overlay       = document.getElementById("overlay");
  const sheet         = document.getElementById("sheet");
  const sheetBody     = document.getElementById("sheetBody");
  const sheetClose    = document.getElementById("sheetClose");

  /* =================================================================
     INIT — fill shop details into the page from CONFIG
  ================================================================= */
  function applyConfigToPage(){
    document.title = CONFIG.shopName + " — " + CONFIG.tagline;
    document.getElementById("shopNameEl").textContent = CONFIG.shopName;
    document.getElementById("shopTaglineEl").textContent = CONFIG.tagline;
    document.getElementById("shopLocationEl").textContent = CONFIG.location;
    document.getElementById("shopPhoneEl").textContent = CONFIG.phoneDisplay;
    document.getElementById("shopNameFooter").textContent = CONFIG.shopName;
    document.getElementById("shopLocationFooter").textContent = CONFIG.location;
    waFab.href = "https://wa.me/" + CONFIG.whatsappNumber +
      "?text=" + encodeURIComponent("Hi " + CONFIG.shopName + ", I have a question about an order.");
  }

  /* =================================================================
     PLACEHOLDER IMAGE — inline SVG swatch, no external dependency,
     so the grid never shows a broken-image icon while you collect
     real product photos.
  ================================================================= */
  const SWATCH_COLORS = ["#F2A60D","#9A2B25","#2F7D4F","#1B2A4A"];
  function placeholderImg(name, category){
    const idx = Math.abs(hashCode(name)) % SWATCH_COLORS.length;
    const color = SWATCH_COLORS[idx];
    const initial = (name || "?").trim().charAt(0).toUpperCase();
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">' +
      '<rect width="300" height="300" fill="' + color + '"/>' +
      '<text x="150" y="168" font-family="Inter, sans-serif" font-size="110" font-weight="700" ' +
      'fill="rgba(255,255,255,0.9)" text-anchor="middle">' + initial + '</text>' +
      '</svg>';
    return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
  }
  function hashCode(str){
    let h = 0;
    for (let i = 0; i < str.length; i++){ h = (h << 5) - h + str.charCodeAt(i); h |= 0; }
    return h;
  }

  /* =================================================================
     CART PERSISTENCE
  ================================================================= */
  function loadCart(){
    try{
      const raw = localStorage.getItem(CART_KEY);
      return raw ? JSON.parse(raw) : {};
    }catch(e){ return {}; }
  }
  function saveCart(){
    try{ localStorage.setItem(CART_KEY, JSON.stringify(cart)); }catch(e){ /* storage unavailable */ }
  }
  function cartCount(){
    return Object.values(cart).reduce((sum, q) => sum + q, 0);
  }
  function cartTotal(){
    return Object.entries(cart).reduce((sum, [id, qty]) => {
      const p = PRODUCTS.find(p => p.id === id);
      return sum + (p ? p.price * qty : 0);
    }, 0);
  }

  /* =================================================================
     RENDER — CATEGORY BAR
  ================================================================= */
  function renderCategoryBar(){
    categoryBar.innerHTML = "";
    CONFIG.categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-pill" + (cat === activeCategory ? " active" : "");
      btn.textContent = cat;
      btn.setAttribute("aria-pressed", cat === activeCategory ? "true" : "false");
      btn.addEventListener("click", () => {
        activeCategory = cat;
        renderCategoryBar();
        renderProducts();
      });
      categoryBar.appendChild(btn);
    });
  }

  /* =================================================================
     RENDER — PRODUCT GRID
  ================================================================= */
  function renderProducts(){
    const list = activeCategory === "All"
      ? PRODUCTS
      : PRODUCTS.filter(p => p.category === activeCategory);

    productGrid.innerHTML = "";
    emptyState.hidden = list.length !== 0;

    list.forEach(p => {
      const card = document.createElement("article");
      card.className = "product-card";

      const imgSrc = p.img || placeholderImg(p.name, p.category);
      const inCart = !!cart[p.id];

      card.innerHTML =
        '<div class="product-img-wrap">' +
          '<span class="price-tag">\u20B9' + p.price + '</span>' +
          '<img src="' + imgSrc + '" alt="' + escapeAttr(p.name) + '" loading="lazy">' +
        '</div>' +
        '<div class="product-body">' +
          '<span class="product-category-tag">' + escapeHtml(p.category) + '</span>' +
          '<h3 class="product-name">' + escapeHtml(p.name) + '</h3>' +
          '<p class="product-desc">' + escapeHtml(p.desc || "") + '</p>' +
          '<button class="add-btn' + (inCart ? ' in-cart' : '') + '" data-id="' + p.id + '">' +
            (inCart ? ('In cart \u00b7 ' + cart[p.id]) : 'Add to cart') +
          '</button>' +
        '</div>';

      productGrid.appendChild(card);
    });

    productGrid.querySelectorAll(".add-btn").forEach(btn => {
      btn.addEventListener("click", () => addToCart(btn.getAttribute("data-id"), btn));
    });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
    }[m]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  /* =================================================================
     CART ACTIONS
  ================================================================= */
  function addToCart(id, sourceBtn){
    cart[id] = (cart[id] || 0) + 1;
    saveCart();
    updateCartBadge();
    renderProducts();
    bump(cartFab);
    if (sourceBtn) bump(sourceBtn);
  }
  function setQty(id, qty){
    if (qty <= 0){ delete cart[id]; }
    else { cart[id] = qty; }
    saveCart();
    updateCartBadge();
    renderCartView();
    renderProducts();
  }
  function bump(el){
    el.classList.remove("bump");
    void el.offsetWidth; // restart animation
    el.classList.add("bump");
  }
  function updateCartBadge(){
    const count = cartCount();
    cartBadge.textContent = count;
    cartBadge.hidden = count === 0;
  }

  /* =================================================================
     SHEET OPEN / CLOSE
  ================================================================= */
  function openSheet(view){
    sheetView = view || "cart";
    renderSheet();
    overlay.classList.add("open");
    sheet.classList.add("open");
    document.body.style.overflow = "hidden";
    sheetClose.focus();
  }
  function closeSheet(){
    overlay.classList.remove("open");
    sheet.classList.remove("open");
    document.body.style.overflow = "";
  }
  overlay.addEventListener("click", closeSheet);
  sheetClose.addEventListener("click", closeSheet);
  cartFab.addEventListener("click", () => openSheet("cart"));
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && sheet.classList.contains("open")) closeSheet();
  });

  /* =================================================================
     RENDER — SHEET (router between cart / checkout / confirm)
  ================================================================= */
  function renderSheet(){
    if (sheetView === "cart") renderCartView();
    else if (sheetView === "checkout") renderCheckoutView();
    else if (sheetView === "confirm") renderConfirmView();
  }

  function renderCartView(){
    sheetView = "cart";
    const ids = Object.keys(cart);

    if (ids.length === 0){
      sheetBody.innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:30px 10px;">' +
        'Your cart is empty. Add a few items to get started!</p>';
      return;
    }

    let rows = "";
    ids.forEach(id => {
      const p = PRODUCTS.find(p => p.id === id);
      if (!p) return;
      const qty = cart[id];
      rows +=
        '<div class="cart-line">' +
          '<div class="cart-line__info">' +
            '<div class="cart-line__name">' + escapeHtml(p.name) + '</div>' +
            '<div class="cart-line__price">\u20B9' + p.price + ' \u00d7 ' + qty + ' = \u20B9' + (p.price * qty) + '</div>' +
          '</div>' +
          '<div class="qty-stepper">' +
            '<button type="button" data-id="' + id + '" data-delta="-1" aria-label="Decrease quantity">\u2212</button>' +
            '<span>' + qty + '</span>' +
            '<button type="button" data-id="' + id + '" data-delta="1" aria-label="Increase quantity">+</button>' +
          '</div>' +
          '<button class="cart-line__remove" data-id="' + id + '" type="button">Remove</button>' +
        '</div>';
    });

    const total = cartTotal();

    sheetBody.innerHTML =
      rows +
      '<div class="cart-totals">' +
        '<div class="row grand"><span>Grand total</span><span>\u20B9' + total + '</span></div>' +
      '</div>' +
      '<div class="sheet-actions">' +
        '<button class="btn btn-primary" id="placeOrderBtn">Place order \u00b7 \u20B9' + total + '</button>' +
        '<button class="btn-text" id="continueShoppingBtn" type="button">Continue shopping</button>' +
      '</div>';

    sheetBody.querySelectorAll(".qty-stepper button").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        const delta = parseInt(btn.getAttribute("data-delta"), 10);
        setQty(id, (cart[id] || 0) + delta);
      });
    });
    sheetBody.querySelectorAll(".cart-line__remove").forEach(btn => {
      btn.addEventListener("click", () => setQty(btn.getAttribute("data-id"), 0));
    });
    document.getElementById("placeOrderBtn").addEventListener("click", () => openSheet("checkout"));
    document.getElementById("continueShoppingBtn").addEventListener("click", closeSheet);
  }

  /* =================================================================
     RENDER — CHECKOUT FORM
  ================================================================= */
  function buildOrderSummaryText(){
    const lines = [];
    Object.keys(cart).forEach(id => {
      const p = PRODUCTS.find(p => p.id === id);
      if (!p) return;
      const qty = cart[id];
      lines.push(p.name + "  x" + qty + "  =  \u20B9" + (p.price * qty));
    });
    lines.push("------------------------");
    lines.push("Grand total: \u20B9" + cartTotal());
    return lines.join("\n");
  }

  function renderCheckoutView(){
    sheetView = "checkout";
    const summary = buildOrderSummaryText();

    sheetBody.innerHTML =
      '<button class="btn-text" id="backToCartBtn" type="button" style="padding-left:0;">\u2190 Back to cart</button>' +
      '<div class="order-summary-box">' + escapeHtml(summary) + '</div>' +
      '<form id="checkoutForm" novalidate>' +
        '<div class="field" id="field-name">' +
          '<label for="custName">Name <span class="req">*</span></label>' +
          '<input type="text" id="custName" name="name" autocomplete="name" required>' +
          '<div class="field-error">Please enter your name.</div>' +
        '</div>' +
        '<div class="field" id="field-phone">' +
          '<label for="custPhone">Phone number <span class="req">*</span></label>' +
          '<input type="tel" id="custPhone" name="phone" autocomplete="tel" inputmode="tel" required>' +
          '<div class="field-error">Please enter a valid phone number.</div>' +
        '</div>' +
        '<div class="field" id="field-address">' +
          '<label for="custAddress">Delivery address <span class="req">*</span></label>' +
          '<textarea id="custAddress" name="address" rows="2" required></textarea>' +
          '<div class="field-error">Please enter your delivery address.</div>' +
        '</div>' +
        '<div class="field" id="field-notes">' +
          '<label for="custNotes">Special instructions (optional)</label>' +
          '<textarea id="custNotes" name="notes" rows="2"></textarea>' +
        '</div>' +
        '<div class="sheet-actions">' +
          '<button type="submit" class="btn btn-primary" id="submitOrderBtn">Confirm order</button>' +
          '<button type="button" class="btn btn-whatsapp" id="waOrderBtn">Send order on WhatsApp instead</button>' +
        '</div>' +
        '<div class="form-status" id="formStatus"></div>' +
      '</form>';

    document.getElementById("backToCartBtn").addEventListener("click", () => openSheet("cart"));
    document.getElementById("checkoutForm").addEventListener("submit", handleCheckoutSubmit);
    document.getElementById("waOrderBtn").addEventListener("click", sendOrderViaWhatsApp);
  }

  function validateCheckoutForm(){
    let valid = true;
    const fields = [
      { id: "field-name", input: "custName" },
      { id: "field-phone", input: "custPhone" },
      { id: "field-address", input: "custAddress" }
    ];
    fields.forEach(f => {
      const wrap = document.getElementById(f.id);
      const input = document.getElementById(f.input);
      const filled = input.value.trim().length > 0;
      const phoneOk = f.input !== "custPhone" || /[\d\s+\-()]{7,}/.test(input.value.trim());
      const ok = filled && phoneOk;
      wrap.classList.toggle("invalid", !ok);
      if (!ok) valid = false;
    });
    return valid;
  }

  function getFormValues(){
    return {
      name: document.getElementById("custName").value.trim(),
      phone: document.getElementById("custPhone").value.trim(),
      address: document.getElementById("custAddress").value.trim(),
      notes: document.getElementById("custNotes").value.trim()
    };
  }

  function handleCheckoutSubmit(e){
    e.preventDefault();
    if (!validateCheckoutForm()) return;

    const values = getFormValues();
    const status = document.getElementById("formStatus");
    const submitBtn = document.getElementById("submitOrderBtn");

    status.className = "form-status show loading";
    status.textContent = "Sending your order\u2026";
    submitBtn.disabled = true;

    const payload = {
      customer_name: values.name,
      phone: values.phone,
      address: values.address,
      instructions: values.notes || "(none)",
      order_summary: buildOrderSummaryText(),
      grand_total: "\u20B9" + cartTotal(),
      _subject: "New order from " + values.name + " \u2014 " + CONFIG.shopName
    };

    fetch(CONFIG.formspreeEndpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload)
    })
      .then(res => {
        if (res.ok){
          cart = {};
          saveCart();
          updateCartBadge();
          renderProducts();
          openSheet("confirm");
        } else {
          throw new Error("Formspree responded with an error");
        }
      })
      .catch(() => {
        status.className = "form-status show error";
        status.textContent =
          "We couldn't email your order automatically (the shop may still be setting this up). " +
          "Please use \u201cSend order on WhatsApp instead\u201d below \u2014 it works right away.";
        submitBtn.disabled = false;
      });
  }

  function sendOrderViaWhatsApp(){
    // WhatsApp fallback works even before Formspree is configured.
    const nameEl = document.getElementById("custName");
    const phoneEl = document.getElementById("custPhone");
    const addrEl = document.getElementById("custAddress");
    const notesEl = document.getElementById("custNotes");

    const name = nameEl.value.trim();
    const phone = phoneEl.value.trim();
    const address = addrEl.value.trim();
    const notes = notesEl.value.trim();

    if (!name || !phone || !address){
      validateCheckoutForm();
      return;
    }

    const message =
      "New order \u2014 " + CONFIG.shopName + "\n\n" +
      buildOrderSummaryText() + "\n\n" +
      "Name: " + name + "\n" +
      "Phone: " + phone + "\n" +
      "Address: " + address + "\n" +
      "Instructions: " + (notes || "(none)");

    window.open("https://wa.me/" + CONFIG.whatsappNumber + "?text=" + encodeURIComponent(message), "_blank");

    cart = {};
    saveCart();
    updateCartBadge();
    renderProducts();
    openSheet("confirm");
  }

  /* =================================================================
     RENDER — CONFIRMATION
  ================================================================= */
  function renderConfirmView(){
    sheetView = "confirm";
    sheetBody.innerHTML =
      '<div class="confirm-wrap">' +
        '<div class="confirm-icon">' +
          '<svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z" fill="currentColor"/></svg>' +
        '</div>' +
        '<h3 class="confirm-title">Order placed!</h3>' +
        '<p class="confirm-text">' + escapeHtml(CONFIG.shopName) +
          ' will contact you on WhatsApp shortly to confirm availability and delivery.</p>' +
        '<div class="sheet-actions">' +
          '<a class="btn btn-whatsapp" href="https://wa.me/' + CONFIG.whatsappNumber +
            '?text=' + encodeURIComponent("Hi, I just placed an order on your website.") +
            '" target="_blank" rel="noopener">Open WhatsApp</a>' +
          '<button class="btn btn-secondary" id="doneBtn" type="button">Continue shopping</button>' +
        '</div>' +
      '</div>';

    document.getElementById("doneBtn").addEventListener("click", closeSheet);
  }

  /* =================================================================
     BOOT
  ================================================================= */
  applyConfigToPage();
  renderCategoryBar();
  renderProducts();
  updateCartBadge();
})();
</script>
</body>
</html>
